<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production WO Status Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=4">
</head>
<body>

<header class="masthead">
  <div class="masthead-row">
    <div>
      <p class="eyebrow">Part Center &middot; Work Order Listing</p>
      <h1>Production WO Status Tracker</h1>
    </div>
    <div class="stamp">
      <span class="conn-dot demo" id="connDot"></span>
      <span id="connLabel">DEMO MODE — data dari snapshot JULY'26</span>
    </div>
  </div>
  <nav class="tabnav">
    <button class="tab-btn active" data-view="tracker">WO Tracker</button>
    <button class="tab-btn" data-view="summary">Daily Summary</button>
    <button class="tab-btn" data-view="trend">Qty Trend</button>
  </nav>
</header>

<section class="view" id="view-tracker">
  <section class="filterbar">
    <div class="filter-grid">
      <div class="field">
        <label for="fLine">Line</label>
        <select id="fLine">
          <option value="">Semua Line</option>
        </select>
      </div>
      <div class="field">
        <label for="fDate">Prod Date</label>
        <input type="date" id="fDate">
      </div>
      <div class="field">
        <label for="fModel">Model (optional)</label>
        <select id="fModel">
          <option value="">Semua Model</option>
        </select>
      </div>
      <div class="field" style="min-width:180px;">
        <label for="fSearch">Cari Item No. / Doc No.</label>
        <input type="text" id="fSearch" placeholder="cth: FS0000464S">
      </div>
      <button class="btn ghost" id="btnReset">Reset</button>
    </div>
  </section>

  <div class="kpis" id="kpiStrip"></div>

  <main class="results">
    <p class="results-meta" id="resultsMeta">—</p>
    <div id="resultsList"></div>
  </main>
</section>

<section class="view" id="view-summary" hidden>
  <main class="results" id="summaryRoot"></main>
</section>

<section class="view" id="view-trend" hidden>
  <section class="filterbar">
    <div class="filter-grid">
      <div class="field">
        <label for="tLine">Line</label>
        <select id="tLine">
          <option value="">Semua Line (combined)</option>
        </select>
      </div>
    </div>
  </section>
  <main class="results">
    <div class="chart-card">
      <div id="trendChart"></div>
    </div>
    <div id="trendTableRoot"></div>
  </main>
</section>

<p class="foot">Production WO Status Tracker &mdash; static site, data via Google Sheets / Apps Script &mdash; lihat README.md untuk setup</p>

<script src="assets/demo-data.js?v=4"></script>
<script src="assets/app.js?v=4"></script>
</body>
</html>
